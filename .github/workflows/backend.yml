name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # JOB 1: Check Code
  # ==========================================
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm run test --if-present 

  # ==========================================
  # JOB 2: Build & Push Docker Image
  # ==========================================
  build-and-push:
    needs: check-code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: . # Look in the ROOT
          push: true
          tags: |
            eklakalam/cloud-task-manager-backend:latest
            eklakalam/cloud-task-manager-backend:${{ github.sha }}
          cache-from: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache
          cache-to: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache,mode=max