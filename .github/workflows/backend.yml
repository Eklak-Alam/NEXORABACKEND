name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removed the cache: 'npm' line because it requires package-lock.json

      - name: 📦 Install Dependencies
        # Changed 'npm ci' to 'npm install' because 'ci' also requires a lock file
        run: npm install

      - name: 🧪 Run Tests
        run: npm run test --if-present 

  build-and-push:
    needs: check-code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            eklakalam/cloud-task-manager-backend:latest
            eklakalam/cloud-task-manager-backend:${{ github.sha }}
          cache-from: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache
          cache-to: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache,mode=max