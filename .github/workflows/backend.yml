name: Backend CI/CD

# Runs ONLY when code in the 'backend' folder changes
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  # ==========================================
  # JOB 1: Test the Code
  # ==========================================
  test-code:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Assuming Node.js for backend as well based on your frontend setup.
      # If you are using Python, Go, etc., swap this step out!
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests (If any exist)
        run: npm run test --if-present 

  # ==========================================
  # JOB 2: Build & Push Docker Image
  # ==========================================
  build-and-push:
    needs: test-code # Guarantees the image ONLY builds if tests pass
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Tags the image with 'latest' in your Backend Docker Hub repo
          tags: eklakalam/cloud-task-manager-backend:latest
          # Caching setup specifically for the backend image
          cache-from: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache
          cache-to: type=registry,ref=eklakalam/cloud-task-manager-backend:buildcache,mode=max

      - name: 🎉 Boom! Success
        run: echo "Backend image successfully built and pushed to Docker Hub, man!"